name: sdl-validate
on:
  workflow_call:
    inputs:
      base:
        description: Merge base ref to compare against
        required: false
        type: string
        default: origin/main
      sdl_ref:
        description: Ref of savioke/sdl to use for validator code
        required: false
        type: string
        default: v1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Checkout sdl-governance
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: savioke/sdl
          ref: ${{ inputs.sdl_ref }}
          path: .sdl-governance

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Run validator
        run: |
          python .sdl-governance/lib/validate.py \
            --base "${{ inputs.base }}" \
            --repo .
